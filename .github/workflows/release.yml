name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version without the leading v (e.g. 1.0.4)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  release:
    name: Release VIGIL v${{ inputs.version }}
    uses: Rynaro/eidolons/.github/workflows/eidolon-release-template.yml@main
    with:
      version: ${{ inputs.version }}
      eiis-version: "1.1"
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
